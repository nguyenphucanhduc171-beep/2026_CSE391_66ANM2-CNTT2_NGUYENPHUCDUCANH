<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Đặt Hàng - Validation Nâng Cao</title>
    <style>
        :root {
    --primary: #4f46e5;
    --primary-hover: #4338ca;
    --bg-body: #f1f5f9;
    --text-dark: #0f172a;
    --text-light: #64748b;
    --error: #ef4444;
    --success: #10b981;
    --glass: rgba(255, 255, 255, 0.95);
}

body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: linear-gradient(to bottom left, #8e2de2 0%, #4a00e0 100%);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    padding: 20px;
    color: var(--text-dark);
}

.container {
    background: var(--glass);
    backdrop-filter: blur(10px);
    max-width: 480px;
    width: 100%;
    padding: 40px;
    border-radius: 24px;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
    position: relative;
    border: 1px solid rgba(255, 255, 255, 0.3);
}

h2 {
    text-align: center;
    font-size: 1.8rem;
    font-weight: 800;
    margin-bottom: 30px;
    letter-spacing: -0.025em;
    background: linear-gradient(to right, #4f46e5, #9333ea);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.form-group {
    margin-bottom: 20px;
}

label {
    display: block;
    font-size: 0.9rem;
    font-weight: 600;
    margin-bottom: 8px;
    color: var(--text-dark);
}

input, select, textarea {
    width: 100%;
    padding: 12px 16px;
    border: 1.5px solid #e2e8f0;
    border-radius: 12px;
    font-size: 15px;
    background-color: #ffffff;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    box-sizing: border-box;
}

input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
}

/* Error States */
.error-msg {
    color: var(--error);
    font-size: 0.75rem;
    font-weight: 500;
    margin-top: 6px;
    display: none;
    animation: slideIn 0.2s ease-out;
}

.invalid {
    border-color: var(--error) !important;
    background-color: #fffafb;
}

@keyframes slideIn {
    from { opacity: 0; transform: translateY(-5px); }
    to { opacity: 1; transform: translateY(0); }
}

/* Radio Payment Buttons - Custom Style */
.radio-group {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
    gap: 10px;
    margin-top: 10px;
}

.radio-group label {
    background: #f8fafc;
    border: 1.5px solid #e2e8f0;
    padding: 10px;
    border-radius: 10px;
    text-align: center;
    cursor: pointer;
    font-size: 0.8rem;
    transition: all 0.2s;
    display: block; /* Ghi đè CSS cũ */
}

.radio-group input {
    display: none; /* Ẩn nút tròn mặc định */
}

/* Khi radio được chọn, đổi màu label */
.radio-group label:has(input:checked) {
    background: var(--primary-soft, #eef2ff);
    border-color: var(--primary);
    color: var(--primary);
    font-weight: 700;
}

/* Total Price Box */
.total-box {
    background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
    padding: 20px;
    border-radius: 16px;
    margin-top: 25px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border: 1px solid #e2e8f0;
}

.total-box span:first-child {
    font-weight: 600;
    color: var(--text-light);
}

.total-amount {
    color: var(--primary);
    font-size: 1.4rem;
    font-weight: 800;
}

button#submit-btn {
    width: 100%;
    background: var(--primary);
    color: white;
    border: none;
    padding: 16px;
    border-radius: 14px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    margin-top: 25px;
    transition: all 0.3s;
    box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.3);
}

button#submit-btn:hover {
    background: var(--primary-hover);
    transform: translateY(-2px);
    box-shadow: 0 20px 25px -5px rgba(79, 70, 229, 0.4);
}

/* Summary Overlay - Apple Style */
#summary-overlay {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(255, 255, 255, 0.98);
    border-radius: 24px;
    z-index: 100;
    padding: 40px;
    flex-direction: column;
    justify-content: center;
    animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
    from { opacity: 0; } to { opacity: 1; }
}

.summary-details {
    background: #f8fafc;
    padding: 20px;
    border-radius: 16px;
    margin: 20px 0;
}

.summary-details p {
    display: flex;
    justify-content: space-between;
    margin: 12px 0;
    font-size: 0.95rem;
    border-bottom: 1px solid #f1f5f9;
    padding-bottom: 8px;
}

.summary-details p strong { color: var(--text-light); font-weight: 500; }

.btn-group {
    display: flex;
    gap: 12px;
}

.btn-confirm {
    flex: 2;
    background: var(--success);
    color: white;
    border: none;
    padding: 14px;
    border-radius: 12px;
    font-weight: 700;
    cursor: pointer;
}

.btn-cancel {
    flex: 1;
    background: #f1f5f9;
    color: var(--text-light);
    border: none;
    padding: 14px;
    border-radius: 12px;
    font-weight: 600;
    cursor: pointer;
}
    </style>
</head>
<body>

<div class="container">
    <h2>🛒 Đặt Hàng Trực Tuyến</h2>
    
    <form id="orderForm" novalidate>
        <div class="form-group">
            <label>Sản phẩm *</label>
            <select id="product">
                <option value="">-- Chọn sản phẩm --</option>
                <option value="Laptop">Laptop Gaming (25.000.000đ)</option>
                <option value="Mouse">Chuột Không Dây (500.000đ)</option>
                <option value="Keyboard">Bàn Phím Cơ (1.200.000đ)</option>
            </select>
            <div class="error-msg" id="err-product">Vui lòng chọn một sản phẩm.</div>
        </div>

        <div class="form-group">
            <label>Số lượng (1-99) *</label>
            <input type="number" id="quantity" value="1" min="1" max="99">
            <div class="error-msg" id="err-quantity">Số lượng phải từ 1 đến 99.</div>
        </div>

        <div class="form-group">
            <label>Ngày giao hàng *</label>
            <input type="date" id="deliveryDate">
            <div class="error-msg" id="err-deliveryDate">Ngày giao từ hôm nay đến 30 ngày tới.</div>
        </div>

        <div class="form-group">
            <label>Địa chỉ giao hàng *</label>
            <textarea id="address" rows="2" placeholder="Nhập địa chỉ cụ thể..."></textarea>
            <div class="error-msg" id="err-address">Địa chỉ phải dài ít nhất 10 ký tự.</div>
        </div>

        <div class="form-group">
            <label>Ghi chú</label>
            <textarea id="note" rows="2" placeholder="Lời nhắn cho shipper..."></textarea>
            <div class="char-info">
                <span class="error-msg" id="err-note" style="margin:0">Quá 200 ký tự rồi!</span>
                <span id="char-count" class="count-text">0/200</span>
            </div>
        </div>

        <div class="form-group">
            <label>Phương thức thanh toán *</label>
            <div class="radio-group">
                <label><input type="radio" name="payment" value="COD"> COD</label>
                <label><input type="radio" name="payment" value="Chuyển khoản"> Chuyển khoản</label>
                <label><input type="radio" name="payment" value="Ví điện tử"> Ví điện tử</label>
            </div>
            <div class="error-msg" id="err-payment">Vui lòng chọn phương thức thanh toán.</div>
        </div>

        <div class="total-box">
            <span>Tổng tiền: </span>
            <span class="total-amount" id="total-price">0đ</span>
        </div>

        <button type="submit" id="submit-btn">ĐẶT HÀNG</button>
    </form>

    <div id="summary-overlay">
        <h3>🔍 Xác nhận đơn hàng</h3>
        <div class="summary-details" id="summary-content"></div>
        <p style="font-weight: bold; text-align: center;">Bạn chắc chắn muốn đặt hàng?</p>
        <div class="btn-group">
            <button class="btn-confirm" onclick="finalSubmit()">Xác nhận</button>
            <button class="btn-cancel" onclick="closeOverlay()">Hủy</button>
        </div>
    </div>
</div>

<script>
    // 1. Dữ liệu giá sản phẩm
    const priceList = {
        "Laptop": 25000000,
        "Mouse": 500000,
        "Keyboard": 1200000
    };

    const form = document.getElementById('orderForm');
    const noteField = document.getElementById('note');
    const charCountDisplay = document.getElementById('char-count');

    // 2. Tính tổng tiền tự động
    function updateTotalPrice() {
        const product = document.getElementById('product').value;
        const qty = parseInt(document.getElementById('quantity').value) || 0;
        const price = priceList[product] || 0;
        const total = price * qty;
        document.getElementById('total-price').innerText = total.toLocaleString('vi-VN') + "đ";
    }

    document.getElementById('product').addEventListener('change', updateTotalPrice);
    document.getElementById('quantity').addEventListener('input', updateTotalPrice);

    // 3. Đếm ký tự realtime cho Ghi chú
    noteField.addEventListener('input', function() {
        const len = this.value.length;
        charCountDisplay.innerText = `${len}/200`;
        
        if (len > 200) {
            charCountDisplay.classList.add('limit-reached');
            toggleError('note', true);
        } else {
            charCountDisplay.classList.remove('limit-reached');
            toggleError('note', false);
        }
    });

    // 4. Hàm helper hiển thị lỗi
    function toggleError(id, isShow) {
        const errDiv = document.getElementById(`err-${id}`);
        const inputField = document.getElementById(id);
        if (errDiv) errDiv.style.display = isShow ? 'block' : 'none';
        if (inputField) isShow ? inputField.classList.add('invalid') : inputField.classList.remove('invalid');
    }

    // Xóa lỗi khi người dùng bắt đầu nhập lại (Sự kiện Blur/Input)
    ['product', 'quantity', 'deliveryDate', 'address'].forEach(id => {
        const el = document.getElementById(id);
        el.addEventListener('blur', () => validateField(id));
        el.addEventListener('input', () => toggleError(id, false));
    });

    // 5. Logic Validate chi tiết
    function validateField(id) {
        const val = document.getElementById(id).value.trim();
        let isErr = false;

        if (id === 'product') isErr = !val;
        if (id === 'quantity') isErr = (val < 1 || val > 99 || val === "");
        if (id === 'address') isErr = (val.length < 10);
        if (id === 'deliveryDate') {
            const pickDate = new Date(val);
            const today = new Date();
            today.setHours(0,0,0,0);
            const maxDate = new Date();
            maxDate.setDate(today.getDate() + 30);
            isErr = (!val || pickDate < today || pickDate > maxDate);
        }
        
        toggleError(id, isErr);
        return !isErr;
    }

    // 6. Xử lý Submit Form
    form.addEventListener('submit', function(e) {
        e.preventDefault();
        
        const isProdValid = validateField('product');
        const isQtyValid = validateField('quantity');
        const isDateValid = validateField('deliveryDate');
        const isAddrValid = validateField('address');
        const isNoteValid = noteField.value.length <= 200;
        
        const paymentChecked = document.querySelector('input[name="payment"]:checked');
        toggleError('payment', !paymentChecked);

        if (isProdValid && isQtyValid && isDateValid && isAddrValid && isNoteValid && paymentChecked) {
            showSummary(paymentChecked.value);
        }
    });

    function showSummary(payMethod) {
        const summaryBox = document.getElementById('summary-overlay');
        const content = document.getElementById('summary-content');
        
        content.innerHTML = `
            <p><strong>Sản phẩm:</strong> ${document.getElementById('product').value}</p>
            <p><strong>Số lượng:</strong> ${document.getElementById('quantity').value}</p>
            <p><strong>Ngày giao:</strong> ${document.getElementById('deliveryDate').value}</p>
            <p><strong>Thanh toán:</strong> ${payMethod}</p>
            <p style="color:red"><strong>Tổng tiền:</strong> ${document.getElementById('total-price').innerText}</p>
        `;
        
        summaryBox.style.display = 'flex';
    }

    function closeOverlay() {
        document.getElementById('summary-overlay').style.display = 'none';
    }

    function finalSubmit() {
        alert("✅ Đặt hàng thành công! Cảm ơn bạn.");
        form.reset();
        document.getElementById('total-price').innerText = "0đ";
        charCountDisplay.innerText = "0/200";
        closeOverlay();
    }
</script>

</body>
</html>
