<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-step Registration Form</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-soft: rgba(79, 70, 229, 0.1);
            --error: #ef4444;
            --success: #10b981;
            --warning: #facc15;
            --bg: #f3f4f6;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            width: 100%;
            max-width: 500px;
        }

        /* Progress Bar */
        .progress-container {
            position: relative;
            display: flex;
            justify-content: space-between;
            margin-bottom: 2.5rem;
        }

        .progress-line {
            position: absolute;
            top: 50%;
            left: 0;
            height: 4px;
            background: #e5e7eb;
            width: 100%;
            transform: translateY(-50%);
            z-index: 1;
        }

        .progress-active {
            position: absolute;
            top: 50%;
            left: 0;
            height: 4px;
            background: var(--primary);
            width: 0%; /* Cập nhật bằng JS */
            transform: translateY(-50%);
            z-index: 2;
            transition: 0.4s ease;
        }

        .dot {
            width: 35px;
            height: 35px;
            background: white;
            border: 4px solid #e5e7eb;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            z-index: 3;
            transition: 0.4s;
        }

        .dot.active { border-color: var(--primary); color: var(--primary); }
        .dot.completed { background: var(--primary); border-color: var(--primary); color: white; }

        /* Form Steps */
        .step { display: none; animation: fadeIn 0.4s ease-in-out; }
        .step.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h3 { margin-top: 0; color: #111827; }
        .form-group { margin-bottom: 1.2rem; position: relative; }
        label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.4rem; color: #374151; }

        input {
            width: 100%;
            padding: 0.75rem;
            border: 1.5px solid #d1d5db;
            border-radius: 0.5rem;
            box-sizing: border-box;
            outline: none;
            transition: 0.2s;
        }

        input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px var(--primary-soft); }
        input.invalid { border-color: var(--error); background: #fef2f2; }

        .error-msg { color: var(--error); font-size: 0.75rem; margin-top: 0.3rem; min-height: 1rem; display: block; }

        /* Password Specific */
        .pass-wrapper { position: relative; }
        .toggle-btn { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); border: none; background: none; cursor: pointer; font-size: 1.1rem; }
        .strength-meter { height: 4px; background: #e5e7eb; margin-top: 8px; border-radius: 2px; }
        .strength-bar { height: 100%; width: 0; transition: 0.3s; border-radius: 2px; }

        /* Footer Buttons */
        .btn-group { display: flex; gap: 1rem; margin-top: 1.5rem; }
        button { flex: 1; padding: 0.8rem; border-radius: 0.5rem; border: none; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn-next, button[type="submit"] { background: var(--primary); color: white; }
        .btn-prev { background: #e5e7eb; color: #374151; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }

        .summary-box { background: #f9fafb; border-radius: 0.5rem; padding: 1rem; border: 1px solid #e5e7eb; }
        .summary-item { display: flex; justify-content: space-between; margin-bottom: 0.5rem; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="container">
    <div class="progress-container">
        <div class="progress-line"></div>
        <div class="progress-active" id="progressActive"></div>
        <div class="dot active">1</div>
        <div class="dot">2</div>
        <div class="dot">3</div>
    </div>

    <form id="regForm" novalidate>
        <div class="step active" id="step1">
            <h3>Thông tin cá nhân</h3>
            <div class="form-group">
                <div style="display:flex; justify-content: space-between">
                    <label>Họ và tên</label>
                    <span id="charCount" style="font-size: 0.75rem; color:#888">0/50</span>
                </div>
                <input type="text" id="fullname" maxlength="50" placeholder="Nguyễn Văn A">
                <span class="error-msg" id="error-fullname"></span>
            </div>
            <div class="form-group">
                <label>Ngày sinh</label>
                <input type="date" id="dob">
                <span class="error-msg" id="error-dob"></span>
            </div>
            <div class="form-group">
                <label>Giới tính</label>
                <div style="display:flex; gap: 20px; padding: 10px 0;">
                    <label style="font-weight:400"><input type="radio" name="gender" value="Nam" style="width:auto"> Nam</label>
                    <label style="font-weight:400"><input type="radio" name="gender" value="Nữ" style="width:auto"> Nữ</label>
                </div>
                <span class="error-msg" id="error-gender"></span>
            </div>
            <button type="button" class="btn-next">Tiếp theo</button>
        </div>

        <div class="step" id="step2">
            <h3>Tài khoản & Bảo mật</h3>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="vi-du@gmail.com">
                <span class="error-msg" id="error-email"></span>
            </div>
            <div class="form-group">
                <label>Mật khẩu</label>
                <div class="pass-wrapper">
                    <input type="password" id="password" placeholder="••••••••">
                    <button type="button" id="toggleBtn" class="toggle-btn">👁️</button>
                </div>
                <div class="strength-meter"><div id="strengthBar" class="strength-bar"></div></div>
                <span class="error-msg" id="error-password"></span>
            </div>
            <div class="btn-group">
                <button type="button" class="btn-prev">Quay lại</button>
                <button type="button" class="btn-next">Tiếp theo</button>
            </div>
        </div>

        <div class="step" id="step3">
            <h3>Xác nhận thông tin</h3>
            <div class="summary-box" id="summaryBox"></div>
            <div class="btn-group">
                <button type="button" class="btn-prev">Quay lại</button>
                <button type="submit">Hoàn tất & Đăng ký</button>
            </div>
        </div>
    </form>

    <div id="successMsg" style="display:none; text-align:center; padding: 2rem;">
        <h1 style="font-size: 4rem;">✅</h1>
        <h2>Đăng ký thành công!</h2>
        <p>Chào mừng bạn đã gia nhập hệ thống.</p>
    </div>
</div>

<script>
    let currentStep = 1;
    const form = document.getElementById('regForm');
    const steps = document.querySelectorAll('.step');
    const dots = document.querySelectorAll('.dot');
    const progressActive = document.getElementById('progressActive');

    // --- TIỆN ÍCH ---
    const showError = (id, msg) => {
        const input = document.getElementById(id);
        if(input) input.classList.add('invalid');
        document.getElementById(`error-${id}`).innerText = msg;
    };

    const clearError = (id) => {
        const input = document.getElementById(id);
        if(input) input.classList.remove('invalid');
        document.getElementById(`error-${id}`).innerText = "";
    };

    // --- VALIDATION TỪNG TRƯỜNG ---
    const validateFullname = () => {
        const val = document.getElementById('fullname').value.trim();
        if(val.length < 3) { showError('fullname', "Họ tên quá ngắn"); return false; }
        clearError('fullname'); return true;
    };

    const validateDOB = () => {
        const val = document.getElementById('dob').value;
        if(!val) { showError('dob', "Vui lòng chọn ngày sinh"); return false; }
        clearError('dob'); return true;
    };

    const validateGender = () => {
        const checked = document.querySelector('input[name="gender"]:checked');
        if(!checked) { showError('gender', "Vui lòng chọn giới tính"); return false; }
        clearError('gender'); return true;
    };

    const validateEmail = () => {
        const val = document.getElementById('email').value.trim();
        const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if(!regex.test(val)) { showError('email', "Email không hợp lệ"); return false; }
        clearError('email'); return true;
    };

    const validatePassword = () => {
        const val = document.getElementById('password').value;
        if(val.length < 8) { showError('password', "Mật khẩu phải ít nhất 8 ký tự"); return false; }
        clearError('password'); return true;
    };

    // --- XỬ LÝ GIAO DIỆN BƯỚC ---
    const updateUI = () => {
        steps.forEach((s, i) => s.classList.toggle('active', i + 1 === currentStep));
        dots.forEach((d, i) => {
            d.classList.toggle('active', i + 1 === currentStep);
            d.classList.toggle('completed', i + 1 < currentStep);
        });
        progressActive.style.width = ((currentStep - 1) / (dots.length - 1)) * 100 + "%";
        
        if(currentStep === 3) {
            document.getElementById('summaryBox').innerHTML = `
                <div class="summary-item"><span>Họ tên:</span> <b>${document.getElementById('fullname').value}</b></div>
                <div class="summary-item"><span>Ngày sinh:</span> <b>${document.getElementById('dob').value}</b></div>
                <div class="summary-item"><span>Giới tính:</span> <b>${document.querySelector('input[name="gender"]:checked').value}</b></div>
                <div class="summary-item"><span>Email:</span> <b>${document.getElementById('email').value}</b></div>
            `;
        }
    };

    // --- EVENTS ---
    // Đếm ký tự
    document.getElementById('fullname').addEventListener('input', function() {
        document.getElementById('charCount').innerText = `${this.value.length}/50`;
        clearError('fullname');
    });

    // Ẩn hiện pass
    document.getElementById('toggleBtn').addEventListener('click', function() {
        const p = document.getElementById('password');
        const isPass = p.type === 'password';
        p.type = isPass ? 'text' : 'password';
        this.innerText = isPass ? '🙈' : '👁️';
    });

    // Password strength
    document.getElementById('password').addEventListener('input', function() {
        const bar = document.getElementById('strengthBar');
        const val = this.value;
        let s = 0;
        if(val.length > 5) s++;
        if(/[A-Z]/.test(val)) s++;
        if(/[0-9]/.test(val)) s++;
        
        bar.style.width = (val === "" ? 0 : (s+1)*25) + "%";
        bar.style.background = s < 1 ? 'var(--error)' : (s < 2 ? 'var(--warning)' : 'var(--success)');
        clearError('password');
    });

    // Điều hướng Next/Prev
    document.querySelectorAll('.btn-next').forEach(b => {
        b.addEventListener('click', () => {
            let ok = false;
            if(currentStep === 1) ok = validateFullname() & validateDOB() & validateGender();
            if(currentStep === 2) ok = validateEmail() & validatePassword();
            
            if(ok) { currentStep++; updateUI(); }
        });
    });

    document.querySelectorAll('.btn-prev').forEach(b => {
        b.addEventListener('click', () => { currentStep--; updateUI(); });
    });

    form.addEventListener('submit', (e) => {
        e.preventDefault();
        form.style.display = 'none';
        document.querySelector('.progress-container').style.display = 'none';
        document.getElementById('successMsg').style.display = 'block';
    });
</script>
</body>
</html>
